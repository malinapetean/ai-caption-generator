server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/caption_app}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:10MB}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-32-byte-secret}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  fastapi:
    base-url: ${FASTAPI_BASE_URL:http://localhost:8000/api}
    generate-path: ${FASTAPI_GENERATE_PATH:/generate-caption}
    captions-per-request: ${FASTAPI_CAPTIONS_PER_REQUEST:3}
    default-style: ${DEFAULT_CAPTION_STYLE:casual}
    connect-timeout-ms: ${FASTAPI_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${FASTAPI_READ_TIMEOUT_MS:30000}
  storage:
    upload-dir: ${UPLOAD_DIR:uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
